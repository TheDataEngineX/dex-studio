# Behavioral interview questions — STAR format
# Format mirrors technical.yaml but includes star_components for structured coaching

questions:
  # ── Conflict & Collaboration ─────────────────────────────────────────────
  - id: beh_conflict_stakeholder
    question: "Tell me about a time you disagreed with a stakeholder on a technical direction. How did you handle it?"
    category: Conflict
    difficulty: medium
    tags: [conflict, stakeholder, communication]
    hints:
      - Describe the disagreement concisely (technical debt, timeline, scope)
      - Show you listened and understood their perspective first
      - Explain how you presented data/evidence for your position
      - Outcome: compromise, escalation, or change of opinion
    star_components:
      situation: Technical disagreement with a stakeholder
      task: Influence direction without authority
      action: Data-driven argument + active listening
      result: Resolution with measurable outcome

  - id: beh_cross_team_conflict
    question: "Describe a situation where two teams had conflicting priorities that affected your work."
    category: Conflict
    difficulty: medium
    tags: [conflict, teams, prioritization]
    hints:
      - Set context: what was at stake for each team
      - Your role: facilitator, escalator, or workaround builder
      - How you aligned incentives or found a shared win
      - Concrete result: unblocked work, process change

  # ── Ownership & Initiative ───────────────────────────────────────────────
  - id: beh_ownership_failure
    question: "Tell me about a time a project you owned failed or fell significantly short. What did you do?"
    category: Ownership
    difficulty: hard
    tags: [ownership, failure, growth]
    hints:
      - Be direct — don't deflect blame to others
      - Show root-cause analysis thinking
      - What you personally changed afterwards
      - Quantify the impact and recovery

  - id: beh_initiative_improvement
    question: "Give an example of a process or system you improved without being asked."
    category: Ownership
    difficulty: easy
    tags: [initiative, ownership, impact]
    hints:
      - Problem you observed that others accepted
      - How you built the case (time saved, error reduction)
      - How you got buy-in and shipped it
      - Measurable outcome

  # ── Delivery & Prioritization ────────────────────────────────────────────
  - id: beh_competing_deadlines
    question: "How do you handle competing deadlines when everything seems equally urgent?"
    category: Delivery
    difficulty: medium
    tags: [prioritization, time-management, delivery]
    hints:
      - Framework: impact × effort, dependencies, stakeholder expectations
      - Communicate early when something will slip
      - Show an actual example where you navigated this
      - Don't say "I just worked harder"

  - id: beh_shipped_under_pressure
    question: "Tell me about the most complex project you shipped under a tight deadline."
    category: Delivery
    difficulty: medium
    tags: [delivery, complexity, pressure]
    hints:
      - Scope the complexity (technical + team + timeline)
      - What you cut, de-risked, or parallelized
      - How you communicated status
      - Result and lessons learned

  # ── Communication ────────────────────────────────────────────────────────
  - id: beh_explain_technical_non_technical
    question: "Describe a time you had to explain a complex technical concept to a non-technical audience."
    category: Communication
    difficulty: easy
    tags: [communication, empathy, clarity]
    hints:
      - What was the concept and why it mattered to them
      - Analogy or visual you used
      - How you checked comprehension
      - Did the explanation change a decision?

  - id: beh_bad_news_upward
    question: "Tell me about a time you had to deliver bad news to your manager or leadership."
    category: Communication
    difficulty: medium
    tags: [communication, trust, transparency]
    hints:
      - Don't bury the lede — lead with the issue
      - Show you came with context, impact, and options (not just the problem)
      - How you maintained trust afterward

  # ── Growth & Feedback ────────────────────────────────────────────────────
  - id: beh_critical_feedback
    question: "Tell me about a piece of critical feedback you received that changed how you work."
    category: Growth
    difficulty: medium
    tags: [growth, feedback, self-awareness]
    hints:
      - Be specific — vague answers signal low self-awareness
      - Show genuine reflection, not just "I turned a weakness into strength"
      - What changed concretely in your behavior
      - Ongoing or one-time change?

  - id: beh_learn_new_technology
    question: "Give an example of when you had to quickly learn a new technology or domain under pressure."
    category: Growth
    difficulty: easy
    tags: [learning, adaptability, growth]
    hints:
      - Context: why was speed required?
      - Your approach: docs, prototypes, asking experts
      - What you shipped and how long it took
      - What you'd do differently

  # ── Leadership & Mentoring ───────────────────────────────────────────────
  - id: beh_mentoring
    question: "Describe your approach to mentoring someone more junior than you."
    category: Leadership
    difficulty: medium
    tags: [leadership, mentoring, growth]
    hints:
      - How you assess where they are vs where they want to go
      - Concrete actions: code review style, pair programming, safe-to-fail assignments
      - How you calibrate feedback (challenge vs support balance)
      - Example outcome

  - id: beh_influence_without_authority
    question: "Tell me about a time you drove a significant change without having formal authority."
    category: Leadership
    difficulty: hard
    tags: [leadership, influence, change]
    hints:
      - Change that benefited the org, not just your team
      - How you built coalitions and addressed objections
      - Handling people who resisted
      - Measurable adoption or outcome

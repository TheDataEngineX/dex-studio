# Technical interview questions — Data Engineering / IT focus
# Format:
#   id: unique slug
#   question: the question text
#   category: broad topic
#   difficulty: easy | medium | hard
#   tags: list of keywords
#   hints: optional list of points to cover
#   sample_answer: optional model answer for AI scoring reference

questions:
  # ── SQL & Data Modeling ──────────────────────────────────────────────────
  - id: sql_window_functions
    question: "Explain window functions in SQL. Give an example using ROW_NUMBER, RANK, and LAG."
    category: SQL
    difficulty: medium
    tags: [sql, analytics, ranking]
    hints:
      - Define window functions vs aggregate functions
      - PARTITION BY and ORDER BY clauses
      - Difference between ROW_NUMBER (unique), RANK (gaps), DENSE_RANK (no gaps)
      - LAG/LEAD for accessing adjacent rows
    sample_answer: |
      Window functions compute values across a set of rows related to the current row
      without collapsing them into a single output row (unlike GROUP BY).
      ROW_NUMBER assigns unique sequential integers. RANK gives the same rank to ties
      but skips numbers. LAG(col, 1) accesses the previous row's value — useful for
      calculating period-over-period differences.

  - id: sql_cte_vs_subquery
    question: "When would you use a CTE over a subquery, and when is a subquery preferable?"
    category: SQL
    difficulty: medium
    tags: [sql, query-optimization]
    hints:
      - CTEs: readability, recursion, reuse within the same query
      - Subqueries: correlated subqueries, EXISTS checks, inline aggregations
      - Performance: most optimizers treat them equivalently; materialized CTEs differ

  - id: data_modeling_star_schema
    question: "Design a star schema for an e-commerce platform. What are the tradeoffs vs snowflake schema?"
    category: Data Modeling
    difficulty: medium
    tags: [data-modeling, warehouse, schema]
    hints:
      - Fact table: orders (order_id, customer_key, product_key, date_key, amount)
      - Dimension tables: customer, product, date, geography
      - Star: denormalized dims, faster queries, more storage
      - Snowflake: normalized dims, storage efficient, more joins

  - id: scd_type2
    question: "Implement a Type 2 Slowly Changing Dimension. What SQL or dbt pattern would you use?"
    category: Data Modeling
    difficulty: hard
    tags: [scd, dbt, data-modeling, warehouse]
    hints:
      - Add effective_from, effective_to, is_current columns
      - On change: set is_current=false / effective_to on old row, insert new row
      - dbt snapshot blocks handle this automatically
      - Surrogate key (sk) vs natural key (nk)

  # ── Data Engineering & Pipelines ────────────────────────────────────────
  - id: pipeline_idempotency
    question: "How do you ensure idempotency in a data pipeline?"
    category: Data Engineering
    difficulty: medium
    tags: [pipelines, reliability, design]
    hints:
      - Idempotent = running N times == running once
      - Delete-before-insert vs MERGE/UPSERT patterns
      - Watermark / partition-based overwrites
      - Deduplication keys and checksums

  - id: spark_partitioning
    question: "Explain the difference between repartition() and coalesce() in Spark. When do you use each?"
    category: Spark
    difficulty: medium
    tags: [spark, performance, partitioning]
    hints:
      - repartition: full shuffle, can increase or decrease, even distribution
      - coalesce: no shuffle, can only decrease, may create skew
      - Use coalesce before writing to reduce small files
      - Use repartition when joining on a key

  - id: streaming_exactly_once
    question: "How does Kafka + Flink (or Spark Structured Streaming) achieve exactly-once semantics?"
    category: Streaming
    difficulty: hard
    tags: [kafka, streaming, flink, spark]
    hints:
      - Kafka transactions + idempotent producers
      - Two-phase commit (2PC) for sink atomicity
      - Checkpointing in Flink (Chandy-Lamport algorithm)
      - Spark: WAL + output committers

  - id: dbt_incremental
    question: "Walk me through how dbt incremental models work. What are the tradeoffs vs full refresh?"
    category: dbt
    difficulty: medium
    tags: [dbt, incremental, warehouse]
    hints:
      - is_incremental() macro, this model reference
      - unique_key for MERGE/UPSERT vs append-only
      - Full refresh needed after schema changes or data corrections
      - Tradeoff: speed vs correctness risk (late-arriving data)

  - id: orchestration_dag_design
    question: "You have 50 tasks with complex dependencies in Airflow. How do you structure the DAG to minimize blast radius on failures?"
    category: Orchestration
    difficulty: hard
    tags: [airflow, orchestration, reliability]
    hints:
      - Task groups for logical separation
      - Sensor tasks for external dependencies
      - on_failure_callback + SLA miss alerts
      - Idempotent tasks allow safe retries
      - Separate DAGs at natural checkpoints to isolate failures

  # ── Cloud & Infrastructure ───────────────────────────────────────────────
  - id: cloud_data_lake_design
    question: "Design a data lake on AWS/GCP/Azure for 100TB/day of raw events. Walk through your architecture."
    category: Cloud
    difficulty: hard
    tags: [cloud, data-lake, architecture, s3, gcs]
    hints:
      - Landing zone (raw) → Bronze (validated) → Silver (transformed) → Gold (serving)
      - Partitioning strategy (date/hour/source)
      - File format choice: Parquet/ORC/Delta/Iceberg
      - Lifecycle policies for cost management
      - Access control: IAM, column-level security

  - id: cost_optimization
    question: "Your Redshift/BigQuery/Snowflake bill doubled last quarter. How do you debug and reduce it?"
    category: Cloud
    difficulty: medium
    tags: [cloud, cost, warehouse]
    hints:
      - Query history + cost attribution by team/pipeline
      - Full table scans vs partition pruning
      - Clustering keys and materialized views
      - Concurrency scaling vs dedicated clusters
      - Storage vs compute separation

  # ── Python & Engineering ────────────────────────────────────────────────
  - id: python_async_vs_thread
    question: "When would you choose asyncio over threading or multiprocessing in Python?"
    category: Python
    difficulty: medium
    tags: [python, concurrency, async]
    hints:
      - asyncio: I/O-bound, many concurrent connections (HTTP, DB)
      - threading: I/O-bound with blocking libs (IMAP, legacy SDKs)
      - multiprocessing: CPU-bound (Pandas transforms, ML inference)
      - GIL prevents true thread parallelism for CPU work

  - id: python_generators
    question: "Explain Python generators and give a data engineering use case where they outperform a list."
    category: Python
    difficulty: easy
    tags: [python, memory, generators]
    hints:
      - yield instead of return, lazy evaluation
      - Memory: processes one row at a time vs loading all into RAM
      - Use case: reading large CSVs, chunked API pagination, streaming transforms

  # ── System Design ────────────────────────────────────────────────────────
  - id: design_real_time_dashboard
    question: "Design a real-time dashboard showing live order counts for 1M events/sec."
    category: System Design
    difficulty: hard
    tags: [system-design, streaming, redis]
    hints:
      - Kafka ingestion → stream processor (Flink/Spark) → Redis/TimescaleDB
      - Pre-aggregate counts at different granularities (1s, 1m, 1h)
      - WebSocket push vs polling tradeoffs
      - Backpressure handling and lag monitoring

  - id: design_feature_store
    question: "Design a feature store for an ML platform serving 10k predictions/sec."
    category: System Design
    difficulty: hard
    tags: [system-design, ml, feature-store]
    hints:
      - Online store (Redis/DynamoDB) for low-latency serving
      - Offline store (Parquet/Delta) for training
      - Point-in-time correct joins to prevent leakage
      - Feature backfill pipeline
      - Versioning and lineage tracking

project:
  name: MovieDEX
  version: 0.1.0
  description: Movie recommendation engine powered by DataEngineX
data:
  engine: duckdb
  sources:
    movies:
      type: csv
      path: data/movies.csv
      query: null
      url: null
      connection: {}
      options: {}
    ratings:
      type: csv
      path: data/ratings.csv
      query: null
      url: null
      connection: {}
      options: {}
    credits:
      type: csv
      path: data/credits.csv
      query: null
      url: null
      connection: {}
      options: {}
  pipelines:
    load_movies:
      source: movies
      transforms:
      - type: filter
        condition: title IS NOT NULL
        expression: null
        name: null
        columns: null
        key: null
        sql: null
        options: {}
      quality:
        completeness: 0.95
        uniqueness:
        - title
        freshness_hours: 1.0
      destination: silver.load_movies
      target: null
      depends_on: []
      schedule: '*/15 * * * *'
    process_ratings:
      source: ratings
      transforms:
      - type: filter
        condition: rating > 0
        expression: null
        name: null
        columns: null
        key: null
        sql: null
        options: {}
      quality:
        completeness: 0.98
        uniqueness:
        - ratingId
        freshness_hours: 0.5
      destination: silver.process_ratings
      target: null
      depends_on: []
      schedule: '*/15 * * * *'
    load_credits:
      source: credits
      transforms:
      - type: filter
        condition: person IS NOT NULL
        expression: null
        name: null
        columns: null
        key: null
        sql: null
        options: {}
      quality:
        completeness: 0.90
        uniqueness:
        - creditId
      destination: silver.load_credits
      target: null
      depends_on: []
      schedule: '*/15 * * * *'
    genre_analysis:
      source: movies
      transforms:
      - type: sql
        condition: null
        expression: null
        name: null
        columns: null
        key: null
        sql: 'SELECT genres, COUNT(*) as movie_count, AVG(rating) as avg_rating, AVG(votes)
          as avg_votes FROM _data GROUP BY genres ORDER BY movie_count DESC'
        options: {}
      quality:
        completeness: 0.99
        custom_sql: 'SELECT COUNT(*) > 0 FROM _data'
      destination: genre_analysis
      target: {layer: gold}
      depends_on: []
      schedule: 0 * * * *
ml:
  tracker: builtin
  tracking:
    backend: builtin
    uri: null
  features:
    backend: builtin
    options: {}
  experiments:
    recommendation_model:
      model_type: sklearn
      target: rating
      features:
      - genre_encoded
      - year
      - votes
      params:
        n_estimators: 100
        max_depth: 5
  serving:
    engine: builtin
    endpoints: []
  drift:
    monitor: []
    method: psi
    threshold: 0.2
ai:
  llm:
    provider: ollama
    model: llama3.2
    fallback: null
    options: {}
  retrieval:
    strategy: hybrid
    top_k: 10
    reranker: true
    options: {}
  vectorstore:
    backend: builtin
    embedding_model: all-MiniLM-L6-v2
    options: {}
  collections:
    movie_summaries:
      source: null
      embedding_model: null
      chunk_size: 512
      chunk_overlap: 50
  agents:
    movie_expert:
      runtime: builtin
      system_prompt: You are a helpful movie recommendation assistant. Help users
        find movies they might enjoy based on their preferences.
      tools:
      - query
      - echo
      model: null
      max_iterations: 10
      memory: short_term
    data_assistant:
      runtime: builtin
      system_prompt: You are a data engineering assistant. Help users understand their
        data pipelines and quality.
      tools:
      - query
      - list_tools
      model: null
      max_iterations: 10
      memory: short_term
secops:
  pii:
    scan: false
    patterns:
    - email
    - ssn
    - phone
    - credit_card
    action: warn
  audit:
    enabled: false
    destination: file
observability:
  metrics: true
  tracing: false
  log_level: INFO

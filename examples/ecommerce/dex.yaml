project:
  name: shopmetrics
  version: 1.0.0
  description: 'ShopMetrics — full-stack e-commerce analytics platform. Demonstrates
    every DataEngineX feature: data pipelines, quality gates, medallion architecture,
    ML training, drift detection, RAG, lineage tracking, and API serving.

    '
data:
  engine: duckdb
  sources:
    raw_customers:
      type: csv
      path: /home/jay/workspace/DataEngineX/dex-studio/examples/ecommerce/data/customers.csv
    raw_products:
      type: csv
      path: /home/jay/workspace/DataEngineX/dex-studio/examples/ecommerce/data/products.csv
    raw_orders:
      type: csv
      path: /home/jay/workspace/DataEngineX/dex-studio/examples/ecommerce/data/orders.csv
  pipelines:
    clean_customers:
      source: raw_customers
      transforms:
      - type: filter
        condition: age > 0 AND tenure_days >= 0
      - type: deduplicate
        key:
        - customer_id
      quality:
        completeness: 0.98
        uniqueness:
        - customer_id
        - email
      destination: silver_customers
    clean_orders:
      source: raw_orders
      transforms:
      - type: filter
        condition: total > 0
      - type: deduplicate
        key:
        - order_id
      quality:
        completeness: 0.99
        uniqueness:
        - order_id
      destination: silver_orders
      depends_on:
      - clean_customers
    customer_revenue:
      source: silver_orders
      transforms:
      - type: sql
        sql: "SELECT\n  customer_id,\n  COUNT(*)                                 \
          \       AS order_count,\n  SUM(total)                                  \
          \    AS lifetime_value,\n  AVG(total)                                  \
          \    AS avg_order_value,\n  SUM(CASE WHEN status = 'refunded' THEN 1 ELSE\
          \ 0 END) AS refund_count\nFROM _data\nGROUP BY customer_id\n"
      destination: gold_customer_revenue
      depends_on:
      - clean_orders
      - clean_customers
    product_performance:
      source: silver_orders
      transforms:
      - type: sql
        sql: "SELECT\n  product_id,\n  COUNT(*)        AS units_sold,\n  SUM(total)\
          \      AS gross_revenue,\n  AVG(unit_price) AS avg_price\nFROM _data\nWHERE\
          \ status = 'completed'\nGROUP BY product_id\nORDER BY gross_revenue DESC\n"
      destination: gold_product_performance
      depends_on:
      - clean_orders
ml:
  tracker: builtin
  tracking:
    backend: builtin
  features:
    backend: builtin
  experiments:
    churn_prediction:
      model_type: sklearn
      target: churned
      features:
      - age
      - tenure_days
      - monthly_spend
      - support_tickets
      - login_frequency
      params:
        n_estimators: 100
        max_depth: 4
        random_state: 42
  serving:
    engine: builtin
  drift:
    monitor:
    - monthly_spend
    - tenure_days
    - support_tickets
    - login_frequency
    method: psi
    threshold: 0.15
ai:
  llm:
    provider: ollama
    model: qwen3:8b
  retrieval:
    strategy: hybrid
    top_k: 5
    reranker: true
  vectorstore:
    backend: builtin
    embedding_model: all-MiniLM-L6-v2
  collections:
    product_catalog:
      chunk_size: 256
      chunk_overlap: 32
    knowledge_base:
      chunk_size: 512
      chunk_overlap: 64
  agents:
    assistant:
      runtime: builtin
      system_prompt: 'You are ShopMetrics AI, a data analytics assistant for e-commerce
        teams.

        You have access to customer data, order history, product catalog, and

        ML model insights. Always cite specific numbers from the data.

        '
      tools:
      - query
      - pipeline_status
      max_iterations: 10
      memory: short_term
    bot:
      runtime: builtin
      system_prompt: ''
      max_iterations: 10
      memory: short_term
    mybot:
      runtime: builtin
      system_prompt: ''
      max_iterations: 10
      memory: short_term
secops:
  pii:
    scan: false
    patterns:
    - email
    - ssn
    - phone
    - credit_card
    action: warn
  audit:
    enabled: false
    db_path: ''
  guard:
    enabled: true
    allow_local: true
    block_on_detect: false
    log_all_outbound: true
    local_targets:
    - ollama
    - local
observability:
  metrics: true
  tracing: true
  log_level: INFO

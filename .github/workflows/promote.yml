name: Promote Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to promote (e.g. sha-abc12345)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [stage, prod]
      strategy:
        description: 'Deployment strategy'
        required: true
        type: choice
        options: [rolling, canary]
        default: rolling
      canary_weight:
        description: 'Canary traffic % (canary strategy only, 1–50)'
        required: false
        type: number
        default: 20

env:
  INFRA_BRANCH: ${{ inputs.environment == 'prod' && 'main' || inputs.environment }}
  OVERLAY: ${{ inputs.environment == 'prod' && 'dex-studio-prod' || 'dex-studio-stage' }}

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: TheDataEngineX/infradex
          ref: ${{ env.INFRA_BRANCH }}
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}

      - uses: imranismail/setup-kustomize@v2

      - name: Pin image tag in ${{ inputs.environment }} overlay
        run: |
          cd argocd/overlays/${{ env.OVERLAY }}
          kustomize edit set image \
            ghcr.io/thedataenginex/dex-studio=ghcr.io/thedataenginex/dex-studio:${{ inputs.image_tag }}

      - name: Render canary ingress
        if: inputs.strategy == 'canary' && inputs.environment == 'prod'
        run: |
          sed "s/__WEIGHT__/${{ inputs.canary_weight }}/g" \
            argocd/overlays/${{ env.OVERLAY }}/canary-ingress.yaml.tmpl \
            > argocd/overlays/${{ env.OVERLAY }}/canary-ingress.yaml

      - name: Remove canary ingress (rolling)
        if: inputs.strategy == 'rolling' && inputs.environment == 'prod'
        run: rm -f argocd/overlays/${{ env.OVERLAY }}/canary-ingress.yaml

      - name: Commit & push to infradex ${{ env.INFRA_BRANCH }} branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add argocd/overlays/${{ env.OVERLAY }}/
          git diff --staged --quiet || \
            git commit -m "chore(dex-studio-${{ inputs.environment }}): promote ${{ inputs.image_tag }} [${{ inputs.strategy }}]"
          git push

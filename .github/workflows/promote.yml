name: Promote to Stage

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to promote from'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: stage
    steps:
      - uses: actions/checkout@v7
        with:
          repository: TheDataEngineX/infradex
          ref: main
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}

      - uses: imranismail/setup-kustomize@v3.0.0

      - name: Get branch name from PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json headRefName --jq '.headRefName')
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag from preview
        id: tag
        run: |
          SLUG=$(echo "${{ steps.pr.outputs.branch }}" \
            | tr '/' '-' | tr '_' '-' \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]//g' \
            | sed 's/^-*//' | sed 's/-*$//' \
            | cut -c1-50)
          FILE="argocd/previews/dex-studio/$SLUG/kustomization.yaml"
          if [ ! -f "$FILE" ]; then
            echo "No preview found for branch ${{ steps.pr.outputs.branch }} (slug: $SLUG)"
            exit 1
          fi
          TAG=$(grep 'newTag:' "$FILE" | awk '{print $2}')
          echo "Promoting image tag: $TAG (from $FILE)"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update stage overlay
        run: |
          cd argocd/overlays/dex-studio-stage
          kustomize edit set image \
            ghcr.io/thedataenginex/dex-studio=ghcr.io/thedataenginex/dex-studio:${{ steps.tag.outputs.image_tag }}

      - name: Create PR to infradex main
        env:
          GH_TOKEN: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          TAG: ${{ steps.tag.outputs.image_tag }}
        run: |
          BRANCH="stage-promote-pr-${{ inputs.pr_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add argocd/overlays/dex-studio-stage/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore(dex-studio-stage): promote $TAG from PR #${{ inputs.pr_number }}"
          git push origin "$BRANCH"
          gh pr create --fill --auto --base main --head "$BRANCH" \
            --title "chore(dex-studio-stage): promote $TAG from PR #${{ inputs.pr_number }}" \
            --body "Promoting dex-studio image tag $TAG to stage from PR #${{ inputs.pr_number }}."

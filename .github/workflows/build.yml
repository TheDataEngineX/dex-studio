name: Build & Publish Image

on:
  push:
    branches: [dev]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'pyproject.toml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: thedataenginex/dex-studio

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: dex-studio

      - name: Clone dex (local dep workaround until dataenginex PyPI release)
        run: git clone --depth=1 https://github.com/TheDataEngineX/DEX.git dex

      - name: Set image vars
        id: vars
        working-directory: dex-studio
        run: echo "short_sha=$(git rev-parse --short=8 HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ steps.vars.outputs.short_sha }}
            type=raw,value=dev

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: dex-studio/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ needs.build.outputs.short_sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  deploy-dev:
    name: Deploy to Dev
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v6
        with:
          repository: TheDataEngineX/infradex
          ref: dev
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}

      - uses: imranismail/setup-kustomize@v2

      - name: Pin image tag in dev overlay
        run: |
          cd argocd/overlays/dex-studio-dev
          kustomize edit set image \
            ghcr.io/thedataenginex/dex-studio=ghcr.io/thedataenginex/dex-studio:sha-${{ needs.build.outputs.short_sha }}

      - name: Commit & push to infradex dev branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add argocd/overlays/dex-studio-dev/kustomization.yaml
          git diff --staged --quiet || \
            git commit -m "chore(dex-studio-dev): deploy sha-${{ needs.build.outputs.short_sha }}"
          git push

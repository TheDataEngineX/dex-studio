name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".github/CODEOWNERS"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".github/CODEOWNERS"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
          enable-cache: true
      - run: uv sync --all-groups --frozen
      - uses: reviewdog/action-actionlint@v1
      - run: uv run poe lint
      - run: uv run poe typecheck
      - name: Unit tests
        run: uv run pytest tests/unit/ -x --tb=short -q
      - name: Integration + security + regression + performance tests
        run: uv run pytest tests/integration/ tests/security/ tests/regression/ tests/performance/ -x --tb=short -q --cov=dex_studio --cov-report=xml
      - uses: codecov/codecov-action@v7
        with:
          flags: dex-studio
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # ── PR only: deploy to ephemeral dev env after all checks pass ──────────
      - name: Compute deploy vars
        id: deploy-vars
        if: github.event_name == 'pull_request'
        run: |
          BRANCH="${{ github.head_ref }}"
          SHA="${{ github.event.pull_request.head.sha }}"
          echo "short_sha=${SHA:0:8}" >> "$GITHUB_OUTPUT"
          SLUG=$(echo "$BRANCH" \
            | tr '/' '-' | tr '_' '-' \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]//g' \
            | sed 's/^-*//' | sed 's/-*$//' \
            | cut -c1-50)
          echo "branch_slug=$SLUG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        if: github.event_name == 'pull_request'
        with:
          repository: TheDataEngineX/infradex
          ref: main
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          path: infradex

      - uses: imranismail/setup-kustomize@v3.0.0
        if: github.event_name == 'pull_request'

      - name: Create or update dev overlay
        if: github.event_name == 'pull_request'
        working-directory: infradex
        env:
          SLUG: ${{ steps.deploy-vars.outputs.branch_slug }}
          SHA: ${{ steps.deploy-vars.outputs.short_sha }}
        run: |
          OVERLAY="argocd/dev/dex-studio/$SLUG"
          mkdir -p "$OVERLAY"
          if [ ! -f "$OVERLAY/kustomization.yaml" ]; then
            cat > "$OVERLAY/kustomization.yaml" <<YAML
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          namespace: dex-studio-dev-$SLUG
          resources:
            - ../../../base-dex-studio
          images:
            - name: ghcr.io/thedataenginex/dex-studio
              newTag: sha-00000000
          patches:
            - target:
                kind: Deployment
                name: dex-studio
              patch: |
                - op: replace
                  path: /spec/replicas
                  value: 1
                - op: replace
                  path: /spec/template/spec/containers/0/resources/requests/cpu
                  value: 100m
                - op: replace
                  path: /spec/template/spec/containers/0/resources/requests/memory
                  value: 256Mi
                - op: replace
                  path: /spec/template/spec/containers/0/resources/limits/cpu
                  value: 250m
                - op: replace
                  path: /spec/template/spec/containers/0/resources/limits/memory
                  value: 1Gi
            - target:
                kind: Ingress
                name: dex-studio
              patch: |
                - op: replace
                  path: /spec/rules/0/host
                  value: $SLUG.dev.dex-studio.thedataenginex.org
            - target:
                kind: ExternalSecret
                name: dex-studio-secrets
              patch: |
                $patch: delete
                apiVersion: external-secrets.io/v1beta1
                kind: ExternalSecret
                metadata:
                  name: dex-studio-secrets
          commonLabels:
            environment: dev
          YAML
          fi
          cd "$OVERLAY"
          kustomize edit set image \
            ghcr.io/thedataenginex/dex-studio=ghcr.io/thedataenginex/dex-studio:sha-$SHA

      - name: Commit & push to infradex main
        if: github.event_name == 'pull_request'
        working-directory: infradex
        env:
          SLUG: ${{ steps.deploy-vars.outputs.branch_slug }}
          SHA: ${{ steps.deploy-vars.outputs.short_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add argocd/dev/dex-studio/$SLUG/
          git diff --staged --quiet || \
            git commit -m "chore(dex-studio-dev-$SLUG): deploy sha-$SHA"
          git push

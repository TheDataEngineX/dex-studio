name: CI

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".github/CODEOWNERS"
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".github/CODEOWNERS"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          git clone --depth=1 https://github.com/TheDataEngineX/DEX.git ../dex
          git clone --depth=1 https://github.com/TheDataEngineX/careerdex.git ../careerdex
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
      - run: uv sync --all-groups
      - run: uv run poe lint
      - run: uv run poe typecheck
      - run: uv run pytest tests/ -x --tb=short -q --cov=dex_studio --cov-report=xml
      - uses: codecov/codecov-action@v6
        with:
          flags: dex-studio
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

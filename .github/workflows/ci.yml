name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".github/CODEOWNERS"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".github/CODEOWNERS"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "latest"
          enable-cache: true
      - run: uv sync --all-groups --frozen
      - uses: reviewdog/action-actionlint@v1
      - run: uv run poe lint
      - run: uv run poe typecheck
      - name: Unit tests
        run: uv run pytest tests/unit/ -x --tb=short -q
      - name: Integration + security + regression + performance tests
        run: uv run pytest tests/integration/ tests/security/ -x --tb=short -q --cov=dex_studio --cov-report=xml
      - uses: codecov/codecov-action@v7
        with:
          flags: dex-studio
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

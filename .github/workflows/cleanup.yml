name: Cleanup Dev

on:
  pull_request:
    types: [closed]

jobs:
  cleanup-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Compute branch slug
        id: slug
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          SLUG=$(echo "$HEAD_REF" \
            | tr '/' '-' | tr '_' '-' \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]//g' \
            | sed 's/^-*//' | sed 's/-*$//' \
            | cut -c1-50)
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v7
        with:
          repository: TheDataEngineX/infradex
          ref: main
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}

      - name: Delete dev overlay
        env:
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          OVERLAY="argocd/dev/dex-studio/$SLUG"
          if [ -d "$OVERLAY" ]; then
            rm -rf "$OVERLAY"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$OVERLAY"
            git commit -m "chore(dex-studio-dev-$SLUG): remove dev env (PR closed)"
            git push
          else
            echo "No dev overlay found for $SLUG — nothing to clean up"
          fi

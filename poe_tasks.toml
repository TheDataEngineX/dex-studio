[tool.poe]
executor.type = "uv"

# ── Installation & Setup ──────────────────────────────────────────────────────
[tool.poe.tasks.install]
cmd = "uv sync"
help = "Install dependencies"

[tool.poe.tasks.setup]
shell = "uv sync --all-groups"
help = "Install all dependency groups (dev included)"

[tool.poe.tasks.setup-system]
shell = "bash scripts/setup-system.sh"
help = "Install system packages (GTK, WebKitGTK, PyGObject) — run 'sudo bash scripts/setup-system.sh' directly if prompted"

[tool.poe.tasks.install-dev]
cmd = "uv pip install -e ../dataenginex"
help = "Install dataenginex as an editable package from the local sibling repo"

# ── Development ───────────────────────────────────────────────────────────────
[tool.poe.tasks.dev]
cmd = "uvicorn dex_studio.app:create_app --factory --host 0.0.0.0 --port 7860 --reload --loop uvloop"
env = { PYTHONPATH = "src" }
envfile = ".env"
help = "Launch DataEngineX Studio dev server (port 7860, hot-reload)"

[tool.poe.tasks.serve]
cmd = "uvicorn dex_studio.app:create_app --factory --host 0.0.0.0 --port 7860 --loop uvloop"
env = { PYTHONPATH = "src" }
help = "Launch DataEngineX Studio production server (port 7860)"

# ── Testing ───────────────────────────────────────────────────────────────────
[tool.poe.tasks.test-cov-core]
cmd = "pytest tests/ -v --cov=dex_studio --cov-report=html --cov-report=xml:coverage.xml --cov-report=term-missing"
help = "Internal: run coverage tests without dependency sync"

[tool.poe.tasks.test-cov]
shell = "poe uv-sync && poe test-cov-core"
help = "Run tests with coverage report (HTML + XML + terminal)"

# ── Code Quality ──────────────────────────────────────────────────────────────
[tool.poe.tasks.lint]
cmd = "ruff check src/ tests/ examples/"
help = "Run ruff linter"

[tool.poe.tasks.lint-fix]
cmd = "ruff check --fix src/ tests/ examples/"
help = "Run ruff linter with auto-fix"

[tool.poe.tasks.typecheck]
cmd = "mypy src/"
help = "Run mypy strict type checking"

[tool.poe.tasks.test]
cmd = "pytest tests/ -v --tb=short"
help = "Run all tests"

[tool.poe.tasks.test-core]
cmd = "pytest tests/ -v --tb=short"
help = "Internal: run tests without dependency sync"

[tool.poe.tasks.check-all-core]
shell = "poe lint && poe typecheck && poe test-core"
help = "Internal: run full checks without dependency sync"

[tool.poe.tasks.check-all]
shell = "poe uv-sync && poe check-all-core"
help = "Run full project checks: lint, typecheck, tests"

[tool.poe.tasks.clean]
shell = "find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null; find . -type f -name '*.pyc' -delete 2>/dev/null; rm -rf .pytest_cache .mypy_cache .ruff_cache dist build *.egg-info .nicegui 2>/dev/null; echo 'Cache and artifacts cleaned'"
help = "Remove cache and build artifacts"

# ── UV Package Manager ────────────────────────────────────────────────────────
[tool.poe.tasks.uv-sync]
cmd = "uv sync"
help = "Install dependencies from uv.lock"
env = { UV_PROJECT_ENVIRONMENT = ".venv" }

[tool.poe.tasks.uv-sync-all]
cmd = "uv sync --all-groups"
help = "Install dependencies from uv.lock for all groups"
env = { UV_PROJECT_ENVIRONMENT = ".venv" }

[tool.poe.tasks.uv-lock]
cmd = "uv lock"
help = "Resolve dependencies from pyproject.toml and write uv.lock"

# ── Version Management ────────────────────────────────────────────────────────
[tool.poe.tasks.version]
shell = "python3 -c \"import tomllib; t=tomllib.load(open('pyproject.toml','rb')); print(t['project']['version'])\""
help = "Show current version"

# ── Code Quality (additional) ─────────────────────────────────────────────────
[tool.poe.tasks.actionlint]
shell = """
if command -v actionlint >/dev/null 2>&1; then
  actionlint .github/workflows/*.yml
else
  echo 'actionlint not found — install: brew install actionlint'
  exit 1
fi
"""
help = "Lint GitHub Actions workflows"

[tool.poe.tasks.format]
shell = "ruff format src/ tests/ examples/"
help = "Format code with ruff"

[tool.poe.tasks.security]
cmd = "uvx pip-audit --progress-spinner off"
help = "Audit dependencies for known vulnerabilities"

# ── Claude Code Settings ──────────────────────────────────────────────────────
[tool.poe.tasks.sync-claude-settings]
shell = """
mkdir -p .claude
cp ../.github/.claude/settings.json .claude/settings.json
echo "✓ .claude/settings.json synced from .github/.claude/settings.json"
"""
help = "Sync shared Claude Code settings from canonical .github/.claude/settings.json"

# ── Docker ───────────────────────────────────────────────────────────────────
[tool.poe.tasks.docker-build]
shell = "docker build -t dex-studio dex-studio/"
cwd = ".."
help = "Build Docker image"

[tool.poe.tasks.docker-serve]
shell = "docker run --rm -p 7860:7860 -e DEX_STUDIO_API_URL=http://host.docker.internal:17000 dex-studio"
help = "Run dex-studio in Docker (connects to local DataEngineX API on host)"

# ── Documentation ────────────────────────────────────────────────────────────
[tool.poe.tasks.docs]
shell = """
python3 -c "
import json, sys
from dex_studio.app import create_app
import os; os.environ.setdefault('DEX_STUDIO_SESSION_SECRET', 'docs')
schema = create_app().openapi()
out = 'docs/openapi.json'
os.makedirs('docs', exist_ok=True)
json.dump(schema, open(out, 'w'), indent=2)
print('OpenAPI schema written to', out, '—', len(schema.get('paths', {})), 'paths')
"
"""
env = { PYTHONPATH = "src" }
help = "Export OpenAPI schema to docs/openapi.json"

# ── AI Agents (Playwright) —───────────────────────────────────────────────────
[tool.poe.tasks.agents-install]
shell = "npm install && npx playwright install chromium"
help = "Install npm packages and Playwright browser for e2e tests"

[tool.poe.tasks.test-e2e-core]
cmd = "npx playwright test"
help = "Internal: run Playwright e2e tests (server must already be running)"

[tool.poe.tasks.test-e2e]
shell = """
trap 'kill %1 2>/dev/null' EXIT
uv run dex-studio --port 7860 &
attempt=0
while [ $attempt -lt 30 ]; do
  if curl -s -o /dev/null http://127.0.0.1:7860/ 2>/dev/null; then break; fi
  attempt=$((attempt + 1))
  sleep 1
done
npx playwright test
"""
help = "Start dex-studio and run Playwright e2e tests"

[tool.poe.tasks.hunt]
shell = """
echo '🎭 DataEngineX Studio — Autonomous Test Hunt'
echo ''
echo '1. Start the server (in another terminal):'
echo '   uv run dex-studio --port 7860'
echo ''
echo '2. Tell your AI assistant (Claude Code, Copilot, etc.):'
echo '   "Using the playwright-test-planner agent, explore'
echo '    http://localhost:7860, then generate and heal tests'
echo '    for all routes. Seed: seed.spec.ts"'
echo ''
echo '3. Run the generated tests:'
echo '   uv run poe test-e2e'
echo ''
echo '4. View the HTML report:'
echo '   npx playwright show-report'
"""
help = "Print instructions for running the autonomous agent pipeline"

# ── Demo & Screenshots ────────────────────────────────────────────────────────
[tool.poe.tasks.screenshots]
cmd  = "python scripts/demo/browser_segments.py --screenshots-only"
env  = { PYTHONPATH = "src" }
help = "Refresh static screenshots only (~60s, no video/audio)"

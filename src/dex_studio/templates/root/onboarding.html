<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Project — DEX Studio</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/studio.css">
  <script>
    /* Apply stored theme before paint to avoid flash */
    (function() {
      var stored = globalThis.localStorage && localStorage.getItem('dex-theme');
      document.documentElement.dataset.theme = stored || 'dark';
    })();
  </script>
  <script defer src="/static/vendor/alpine.min.js"></script>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--gray-2)"
      x-data="{
        tab: 'open',
        selectedIsExample: {{ 'true' if (all_projects and all_projects[0].source == 'example') else 'false' }},
        onSelect(e) {
          var opt = e.target.options[e.target.selectedIndex];
          this.selectedIsExample = opt.dataset.source === 'example';
        }
      }">

  <div class="card animate-scale-in" style="width:480px;padding:32px">
    <!-- Header -->
    <div style="text-align:center;margin-bottom:24px">
      <div style="background:var(--accent-9);border-radius:10px;padding:10px;display:inline-flex;margin-bottom:12px">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
      <h1 style="font-size:20px;font-weight:700;margin:0 0 4px">DEX Studio</h1>
      <p style="font-size:13px;color:var(--text-3);margin:0">Open or create a DataEngineX project</p>
    </div>

    {% if error %}
    <div style="background:var(--red-2);border:1px solid var(--red-6);border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--red-11)">
      {{ error }}
    </div>
    {% endif %}

    {% if warnings %}
    <div style="background:var(--amber-2);border:1px solid var(--amber-6);border-radius:6px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--amber-11)">
      {% for w in warnings %}<p style="margin:0">{{ w }}</p>{% endfor %}
    </div>
    {% endif %}

    <!-- Tabs -->
    <div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:20px">
      <button @click="tab='open'" type="button"
              :style="tab==='open' ? 'border-bottom:2px solid var(--accent-9);color:var(--accent-11);font-weight:600' : 'border-bottom:2px solid transparent;color:var(--text-3)'"
              style="padding:7px 14px;background:none;border:none;cursor:pointer;font-size:13px;margin-bottom:-1px;display:flex;align-items:center;gap:5px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Open Project
      </button>
      <button @click="tab='new'" type="button"
              :style="tab==='new' ? 'border-bottom:2px solid var(--accent-9);color:var(--accent-11);font-weight:600' : 'border-bottom:2px solid transparent;color:var(--text-3)'"
              style="padding:7px 14px;background:none;border:none;cursor:pointer;font-size:13px;margin-bottom:-1px;display:flex;align-items:center;gap:5px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Project
      </button>
    </div>

    <!-- Open tab -->
    <div x-show="tab==='open'">
      {% if all_projects %}
      <form method="post" action="/onboarding/open">
        <div style="margin-bottom:12px">
          <label for="project_select" style="display:block;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:4px">Project</label>
          <select id="project_select" name="config_path"
                  class="input"
                  style="width:100%;height:36px;font-size:13px"
                  @change="onSelect($event)">
            {% set user_projs = all_projects | selectattr('source', 'equalto', 'user') | list %}
            {% set example_projs = all_projects | selectattr('source', 'equalto', 'example') | list %}
            {% if user_projs %}
            <optgroup label="My Projects">
              {% for p in user_projs %}
              <option value="{{ p.path }}" data-source="user">{{ p.name }}</option>
              {% endfor %}
            </optgroup>
            {% endif %}
            {% if example_projs %}
            <optgroup label="Examples">
              {% for p in example_projs %}
              <option value="{{ p.path }}" data-source="example">{{ p.name }}</option>
              {% endfor %}
            </optgroup>
            {% endif %}
          </select>
        </div>
        <input type="hidden" name="is_example" :value="selectedIsExample ? '1' : ''">
        <button type="submit" class="btn primary" style="width:100%;height:36px;font-size:13px">Open Selected</button>
      </form>

      <div style="display:flex;align-items:center;gap:8px;margin:16px 0">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="font-size:11px;color:var(--text-3)">or enter path manually</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      {% endif %}

      <form method="post" action="/onboarding/open">
        <div style="margin-bottom:12px">
          {% if not all_projects %}
          <label for="config_path_manual" style="display:block;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:4px">Config path</label>
          {% endif %}
          <input id="config_path_manual" type="text" name="config_path" placeholder="/path/to/dex.yaml"
                 class="input"
                 style="width:100%;font-family:var(--font-mono);font-size:12px">
        </div>
        <button type="submit" class="btn {{ 'ghost' if all_projects else 'primary' }}"
                style="width:100%;height:36px;font-size:13px">
          Open from Path
        </button>
      </form>
    </div>

    <!-- New tab -->
    <div x-show="tab==='new'" style="display:none">
      <form method="post" action="/onboarding/create">
        <div style="margin-bottom:12px">
          <label for="project_name" style="display:block;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:4px">Project Name</label>
          <input id="project_name" type="text" name="project_name" placeholder="my-project" required
                 class="input" style="width:100%;font-size:13px">
        </div>
        <div style="margin-bottom:16px">
          <label for="project_path" style="display:block;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:4px">
            Location
            <span style="font-weight:400;color:var(--text-3)">(leave blank for ~/.dex-studio/projects/)</span>
          </label>
          <input id="project_path" type="text" name="project_path" placeholder="~/.dex-studio/projects/my-project"
                 class="input"
                 style="width:100%;font-family:var(--font-mono);font-size:12px">
        </div>
        <button type="submit" class="btn primary" style="width:100%;height:36px;font-size:13px">
          Create &amp; Open
        </button>
      </form>
    </div>
  </div>

  <!-- icons are inline SVG; no lucide runtime needed -->
</body>
</html>
